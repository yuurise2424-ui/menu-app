<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA化（アプリ化）のための設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="メニュー案内">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href='data:application/manifest+json,{"name":"メニュー案内","short_name":"メニュー","start_url":".","display":"standalone","background_color":"#000000","theme_color":"#141414"}'>

    <title>メニュー案内</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        /* 全画面表示のベース設定 */
        html, body {
            height: 100%;
            background: #000;
            font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            /* iOS Safariのバウンススクロールを防ぐ */
            overscroll-behavior-y: none;
        }

        /* アプリのメインコンテナ（透明度を廃止し固定色に） */
        #app {
            height: 100dvh; /* スマホのアドレスバーやナビゲーションバーを考慮 */
            display: flex;
            flex-direction: column;
            background: #141414;
            color: #eee;
            width: 100%;
        }

        /* ヘッダー部 */
        .header {
            padding: 12px 16px;
            /* iPhoneのノッチ（上の出っ張り）を考慮した余白 */
            padding-top: calc(12px + env(safe-area-inset-top)); 
            border-bottom: 1px solid #333;
            background: #0a0a0a;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            background: none; border: none; color: #aaa;
            font-size: 24px; cursor: pointer;
            padding: 0 8px; display: none; line-height: 1;
        }
        .back-btn.visible { display: block; }

        .header-title {
            flex: 1; font-size: 16px; font-weight: bold;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-align: center;
        }

        /* ネットワーク状態バッジ */
        .offline-badge {
            font-size: 10px; background: #e74c3c; color: #fff;
            padding: 2px 6px; border-radius: 4px; display: none;
            margin-left: 8px; font-weight: normal;
        }
        .offline-badge.visible { display: inline-block; }

        /* リスト部分 */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            /* iPhoneの下部バー（ホームインジケータ）を考慮した余白 */
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            overscroll-behavior: contain;
        }

        .list-item {
            border-bottom: 1px solid #333;
            padding: 16px 0;
            cursor: pointer;
        }
        .list-item:last-child { border-bottom: none; }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-name { font-size: 16px; font-weight: bold; flex: 1; line-height: 1.4; }
        .item-price { font-size: 15px; color: #f5a623; margin-left: 12px; white-space: nowrap; }
        .arrow { color: #666; font-size: 18px; margin-left: 12px; }

        /* 商品の詳細（アコーディオン） */
        .item-details {
            display: none;
            margin-top: 12px;
            padding: 12px;
            background: #222;
            border-radius: 8px;
            font-size: 14px;
        }
        .list-item.open .item-details { display: block; }
        
        .field { margin-bottom: 10px; }
        .field:last-child { margin-bottom: 0; }
        .field-label { font-size: 12px; color: #888; margin-bottom: 4px; }
        .field-value { color: #ddd; line-height: 1.5; }
        .field-value.alert-text { color: #ff6b6b; font-weight: bold; }

        .status-msg { padding: 30px 20px; text-align: center; font-size: 15px; color: #888; }
    </style>
</head>
<body>

<div id="app">
    <!-- ヘッダー -->
    <div class="header">
        <button class="back-btn" id="back-btn" onclick="renderCats()">‹</button>
        <div class="header-title">
            <span id="header-title-text" data-cat="">読み込み中...</span>
            <span id="offline-badge" class="offline-badge">オフライン</span>
        </div>
        <div style="width: 40px; display: none;" id="header-spacer"></div>
    </div>

    <!-- リスト -->
    <div class="list-container" id="item-list">
        <div class="status-msg">データを準備しています...</div>
    </div>
</div>

<script>
    const SHEET_ID = '1yroIO2G1QG_F7J3plZYO_gdy3Y898wk6pUS3Y7lT7oU';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    let data = [];

    // アプリ起動時の処理（ハイブリッド方式）
    async function load() {
        const listEl = document.getElementById('item-list');
        const badgeEl = document.getElementById('offline-badge');
        
        // 1. まずローカルストレージ（スマホ内）に保存された前回データがあるか確認
        const cachedCsv = localStorage.getItem('menuCsvData');
        
        if (cachedCsv) {
            // 保存データがあれば、一瞬で画面を描画する
            parseAndRender(cachedCsv);
        }

        // 2. 裏側で最新データをスプレッドシートに取りに行く
        try {
            const res = await fetch(CSV_URL + '&t=' + Date.now());
            if (!res.ok) throw new Error('Network response was not ok');
            
            const text = await res.text();
            
            // 取得に成功したら、スマホ内のデータを最新に上書き保存
            localStorage.setItem('menuCsvData', text);
            
            // 画面も最新データで上書き描画
            parseAndRender(text);
            badgeEl.classList.remove('visible'); // オフラインバッジを消す

        } catch (e) {
            // 取得に失敗（Wi-Fiが繋がっていない等）した場合
            if (cachedCsv) {
                // キャッシュがある場合はそのまま表示を続け、オフラインバッジを出す
                badgeEl.classList.add('visible');
            } else {
                // 初回起動でオフラインの場合はエラーを出す
                listEl.innerHTML = 
                    `<div class="status-msg">通信エラー。<br>初回はWi-Fi環境で開いてください。<br><button onclick="load()" style="margin-top:15px; padding:8px 16px; border-radius:6px; border:none; background:#555; color:#fff;">再試行</button></div>`;
                document.getElementById('header-title-text').textContent = 'エラー';
            }
        }
    }

    // CSVを解析してデータを整え、画面を描画する関数
    function parseAndRender(text) {
        const rows = parseCSV(text);
        let lastCat = '';
        data = rows.slice(1)
            .map(r => {
                if (r[0]) lastCat = r[0];
                return {
                    cat:     lastCat,
                    name:    r[1] || '',
                    price:   r[2] || '',
                    amount:  r[3] || '',
                    fat:     r[4] || '',
                    parts:   r[5] || '',
                    desc:    r[6] || '',
                    note:    r[7] || '',
                    allergy: r[8] || '',
                };
            })
            .filter(r => r.name);

        // 現在どの画面（カテゴリ）を開いているか判別して再描画
        const currentCat = document.getElementById('header-title-text').dataset.cat;
        if (currentCat) {
            renderItems(currentCat);
        } else {
            renderCats();
        }
    }

    // CSVパーサー
    function parseCSV(text) {
        const rows = [];
        let row = [], cell = '', q = false;
        for (let i = 0; i < text.length; i++) {
            const c = text[i];
            if (q) {
                if (c === '"') { if (text[i+1] === '"') { cell += '"'; i++; } else q = false; }
                else cell += c;
            } else {
                if (c === '"') q = true;
                else if (c === ',') { row.push(cell.trim()); cell = ''; }
                else if (c === '\n' || c === '\r') {
                    if (c === '\r' && text[i+1] === '\n') i++;
                    row.push(cell.trim()); rows.push(row); row = []; cell = '';
                } else cell += c;
            }
        }
        if (row.length) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }

    // カテゴリ一覧の描画
    function renderCats() {
        const backBtn = document.getElementById('back-btn');
        const spacer = document.getElementById('header-spacer');
        const titleText = document.getElementById('header-title-text');
        
        backBtn.classList.remove('visible');
        spacer.style.display = 'none';
        titleText.textContent = 'カテゴリ';
        titleText.dataset.cat = '';

        const seen = new Set();
        const cats = data.map(r => r.cat).filter(c => c && !seen.has(c) && seen.add(c));

        if (cats.length === 0) {
            document.getElementById('item-list').innerHTML = `<div class="status-msg">データがありません</div>`;
            return;
        }

        document.getElementById('item-list').innerHTML = cats.map(cat => `
            <div class="list-item" onclick="renderItems('${esc(cat)}')">
                <div class="item-header">
                    <div class="item-name">${esc(cat)}</div>
                    <div class="arrow">›</div>
                </div>
            </div>
        `).join('');
    }

    // アイテム一覧の描画
    function renderItems(cat) {
        const backBtn = document.getElementById('back-btn');
        const spacer = document.getElementById('header-spacer');
        const titleText = document.getElementById('header-title-text');
        
        backBtn.classList.add('visible');
        spacer.style.display = 'block';
        titleText.textContent = cat;
        titleText.dataset.cat = cat;

        const items = data.filter(r => r.cat === cat);
        const listEl = document.getElementById('item-list');

        listEl.innerHTML = items.map((item) => {
            const details = [
                { label: '枚数/グラム', val: item.amount, isAlert: false },
                { label: '脂の量', val: item.fat, isAlert: false },
                { label: '材料/部位', val: item.parts, isAlert: false },
                { label: '説明', val: item.desc, isAlert: false },
                { label: '注意点', val: item.note, isAlert: true },
                { label: 'アレルギー', val: item.allergy, isAlert: true }
            ].filter(d => d.val);

            let detailsHtml = '';
            if (details.length > 0) {
                detailsHtml = `<div class="item-details">` + 
                    details.map(d => `
                        <div class="field">
                            <div class="field-label">${esc(d.label)}</div>
                            <div class="field-value ${d.isAlert ? 'alert-text' : ''}">${esc(d.val)}</div>
                        </div>
                    `).join('') + 
                `</div>`;
            }

            return `
                <div class="list-item" onclick="if(this.querySelector('.item-details')) this.classList.toggle('open')">
                    <div class="item-header">
                        <div class="item-name">${esc(item.name)}</div>
                        ${item.price ? `<div class="item-price">${esc(item.price)}</div>` : ''}
                    </div>
                    ${detailsHtml}
                </div>
            `;
        }).join('');
        
        listEl.scrollTop = 0;
    }

    function esc(s) {
        return String(s ?? '')
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
</script>
</body>
</html>
