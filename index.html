<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="メニュー案内">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxOTIgMTkyIj48cmVjdCB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgZmlsbD0iIzE0MTQxNCIvPjx0ZXh0IHg9Ijk2IiB5PSI4MiIgZm9udC1zaXplPSI2MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iI2ZmZmZmZiI+5p2OPC90ZXh0Pjx0ZXh0IHg9Ijk2IiB5PSIxNTAiIGZvbnQtc2l6ZT0iNjAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiNmZmZmZmYiPuaYhzwvdGV4dD48L3N2Zz4=">

    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="./manifest.json">

    <title>メニュー案内</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            background: #000;
            font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            overscroll-behavior-y: none;
        }

        #app {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: #141414;
            color: #eee;
            width: 100%;
        }

        .header {
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            border-bottom: 1px solid #333;
            background: #0a0a0a;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none; border: none; color: #aaa;
            font-size: 24px; cursor: pointer;
            padding: 0 8px; display: none; line-height: 1;
        }
        .back-btn.visible { display: block; }

        .header-title {
            flex: 1; font-size: 16px; font-weight: bold;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-align: center;
        }

        .offline-badge {
            font-size: 10px; background: #e74c3c; color: #fff;
            padding: 2px 6px; border-radius: 4px; display: none;
            margin-left: 8px; font-weight: normal;
        }
        .offline-badge.visible { display: inline-block; }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            overscroll-behavior: contain;
        }

        /* トップ選択画面 */
        .mode-select {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 32px 0;
        }

        .mode-btn {
            background: #222;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 36px 16px;
            color: #eee;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            letter-spacing: 0.1em;
            width: 100%;
        }
        .mode-btn:active { background: #2e2e2e; }

        /* リスト */
        .list-item {
            border-bottom: 1px solid #333;
            padding: 16px 0;
            cursor: pointer;
        }
        .list-item:last-child { border-bottom: none; }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-name { font-size: 16px; font-weight: bold; flex: 1; line-height: 1.4; }
        .item-price { font-size: 15px; color: #f5a623; margin-left: 12px; white-space: nowrap; }
        .arrow { color: #666; font-size: 18px; margin-left: 12px; }

        .item-details {
            display: none;
            margin-top: 12px;
            padding: 12px;
            background: #222;
            border-radius: 8px;
            font-size: 14px;
        }
        .list-item.open .item-details { display: block; }

        .field { margin-bottom: 10px; }
        .field:last-child { margin-bottom: 0; }
        .field-label { font-size: 12px; color: #888; margin-bottom: 4px; }
        .field-value { color: #ddd; line-height: 1.5; }

        .field-value.alert-text { color: #ff6b6b; font-weight: bold; }
        .field-value.guide-text { color: #8bd3e6; }
        .field-value.condiment-text { color: #f9d71c; }

        .status-msg { padding: 30px 20px; text-align: center; font-size: 15px; color: #888; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <button class="back-btn" id="back-btn">‹</button>
        <div class="header-title">
            <span id="header-title-text">読み込み中...</span>
            <span id="offline-badge" class="offline-badge">オフライン</span>
        </div>
        <div style="width: 40px; display: none;" id="header-spacer"></div>
    </div>

    <div class="list-container" id="item-list">
        <div class="status-msg">データを準備しています...</div>
    </div>
</div>

<script>
    const SHEET_ID = '1yroIO2G1QG_F7J3plZYO_gdy3Y898wk6pUS3Y7lT7oU';
    const FOOD_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=フード`;
    const DRINK_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=ドリンク`;

    let foodData  = [];
    let drinkData = [];
    let currentMode = null; // null | 'food' | 'drink'
    let currentCat  = '';

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    async function load() {
        const badgeEl = document.getElementById('offline-badge');

        const cachedFood  = localStorage.getItem('menuFoodData');
        const cachedDrink = localStorage.getItem('menuDrinkData');

        if (cachedFood)  foodData  = parseFoodCSV(cachedFood);
        if (cachedDrink) drinkData = parseDrinkCSV(cachedDrink);
        if (cachedFood || cachedDrink) renderCurrent();

        let networkError = false;

        await Promise.all([
            fetch(FOOD_URL + '&t=' + Date.now())
                .then(r => { if (!r.ok) throw new Error(); return r.text(); })
                .then(text => { localStorage.setItem('menuFoodData', text); foodData = parseFoodCSV(text); })
                .catch(() => { networkError = true; }),

            fetch(DRINK_URL + '&t=' + Date.now())
                .then(r => { if (!r.ok) throw new Error(); return r.text(); })
                .then(text => { localStorage.setItem('menuDrinkData', text); drinkData = parseDrinkCSV(text); })
                .catch(() => { networkError = true; })
        ]);

        if (networkError) {
            if (!cachedFood && !cachedDrink) {
                document.getElementById('item-list').innerHTML =
                    `<div class="status-msg">通信エラー。<br>初回はWi-Fi環境で開いてください。<br><button onclick="load()" style="margin-top:15px;padding:8px 16px;border-radius:6px;border:none;background:#555;color:#fff;">再試行</button></div>`;
                document.getElementById('header-title-text').textContent = 'エラー';
                return;
            }
            badgeEl.classList.add('visible');
        } else {
            badgeEl.classList.remove('visible');
        }

        renderCurrent();
    }

    function renderCurrent() {
        if (currentMode === null) renderTop();
        else if (currentCat === '') renderCats(currentMode);
        else renderItems(currentMode, currentCat);
    }

    function parseFoodCSV(text) {
        const rows = parseCSV(text);
        let lastCat = '';
        return rows.slice(1).map(r => {
            if (r[0]) lastCat = r[0];
            return {
                cat: lastCat, name: r[1] || '', price: r[2] || '',
                amount: r[3] || '', fat: r[4] || '', parts: r[5] || '',
                desc: r[6] || '', guide: r[7] || '', condiment: r[8] || '',
                note: r[9] || '', allergy: r[10] || '',
            };
        }).filter(r => r.name);
    }

    function parseDrinkCSV(text) {
        const rows = parseCSV(text);
        let lastCat = '';
        return rows.slice(1).map(r => {
            if (r[0]) lastCat = r[0];
            return {
                cat: lastCat, name: r[1] || '',
                glass: r[2] || '', amount: r[3] || '', note: r[4] || '',
            };
        }).filter(r => r.name);
    }

    function parseCSV(text) {
        const rows = [];
        let row = [], cell = '', q = false;
        for (let i = 0; i < text.length; i++) {
            const c = text[i];
            if (q) {
                if (c === '"') { if (text[i+1] === '"') { cell += '"'; i++; } else q = false; }
                else cell += c;
            } else {
                if (c === '"') q = true;
                else if (c === ',') { row.push(cell.trim()); cell = ''; }
                else if (c === '\n' || c === '\r') {
                    if (c === '\r' && text[i+1] === '\n') i++;
                    row.push(cell.trim()); rows.push(row); row = []; cell = '';
                } else cell += c;
            }
        }
        if (row.length) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }

    function setHeader(title, backFn) {
        const backBtn  = document.getElementById('back-btn');
        const spacer   = document.getElementById('header-spacer');
        const titleEl  = document.getElementById('header-title-text');
        titleEl.textContent = title;
        if (backFn) {
            backBtn.classList.add('visible');
            backBtn.onclick = backFn;
            spacer.style.display = 'block';
        } else {
            backBtn.classList.remove('visible');
            spacer.style.display = 'none';
        }
    }

    function renderTop() {
        currentMode = null;
        currentCat  = '';
        setHeader('メニュー案内', null);
        document.getElementById('item-list').innerHTML = `
            <div class="mode-select">
                <button class="mode-btn" onclick="renderCats('food')">フード</button>
                <button class="mode-btn" onclick="renderCats('drink')">ドリンク</button>
            </div>
        `;
    }

    function renderCats(mode) {
        currentMode = mode;
        currentCat  = '';
        setHeader(mode === 'food' ? 'フード' : 'ドリンク', renderTop);

        const data = mode === 'food' ? foodData : drinkData;
        const seen = new Set();
        const cats = data.map(r => r.cat).filter(c => c && !seen.has(c) && seen.add(c));

        if (cats.length === 0) {
            document.getElementById('item-list').innerHTML = `<div class="status-msg">データがありません</div>`;
            return;
        }

        document.getElementById('item-list').innerHTML = cats.map(cat => `
            <div class="list-item" onclick="renderItems('${mode}','${esc(cat)}')">
                <div class="item-header">
                    <div class="item-name">${esc(cat)}</div>
                    <div class="arrow">›</div>
                </div>
            </div>
        `).join('');
        document.getElementById('item-list').scrollTop = 0;
    }

    function renderItems(mode, cat) {
        currentCat = cat;
        setHeader(cat, () => renderCats(mode));

        const data  = mode === 'food' ? foodData : drinkData;
        const items = data.filter(r => r.cat === cat);
        const listEl = document.getElementById('item-list');

        listEl.innerHTML = items.map(item => {
            const fields = mode === 'food'
                ? [
                    { label: '枚数/グラム',   val: item.amount,    cls: '' },
                    { label: '脂の量',         val: item.fat,       cls: '' },
                    { label: '材料/部位',       val: item.parts,     cls: '' },
                    { label: '説明',            val: item.desc,      cls: '' },
                    { label: '接客時の説明',    val: item.guide,     cls: 'guide-text' },
                    { label: '付けるもの',      val: item.condiment, cls: 'condiment-text' },
                    { label: '注意点',          val: item.note,      cls: 'alert-text' },
                    { label: 'アレルギー',      val: item.allergy,   cls: 'alert-text' },
                ]
                : [
                    { label: 'グラスの種類',   val: item.glass,  cls: '' },
                    { label: '分量詳細',        val: item.amount, cls: 'guide-text' },
                    { label: 'その他',          val: item.note,   cls: 'alert-text' },
                ];

            const detailsHtml = fields.filter(d => d.val).length > 0
                ? `<div class="item-details">${fields.filter(d => d.val).map(d => `
                    <div class="field">
                        <div class="field-label">${esc(d.label)}</div>
                        <div class="field-value ${d.cls}">${esc(d.val).replace(/\n/g,'<br>')}</div>
                    </div>`).join('')}</div>`
                : '';

            return `
                <div class="list-item" onclick="if(this.querySelector('.item-details'))this.classList.toggle('open')">
                    <div class="item-header">
                        <div class="item-name">${esc(item.name)}</div>
                        ${item.price ? `<div class="item-price">${esc(item.price)}</div>` : ''}
                    </div>
                    ${detailsHtml}
                </div>`;
        }).join('');

        listEl.scrollTop = 0;
    }

    function esc(s) {
        return String(s ?? '')
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
</script>
</body>
</html>
