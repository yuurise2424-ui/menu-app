<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>メニュー案内</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            background: transparent;
        }

        /* メインパネル（透明度調整対象） */
        #app {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: rgba(15, 15, 15, 0.92);
            font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            color: #eee;
            transition: background 0.1s;
        }

        /* トップバー */
        .topbar {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            gap: 8px;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }
        .back-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 6px;
            line-height: 1;
            display: none;
        }
        .back-btn.visible { display: block; }
        .topbar-title {
            flex: 1;
            font-size: 14px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 透明度スライダー */
        .opacity-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }
        .opacity-icon { font-size: 14px; }
        #opacity-slider {
            width: 70px;
            height: 4px;
            accent-color: #c0392b;
            cursor: pointer;
        }

        /* リスト */
        .list {
            flex: 1;
            overflow-y: auto;
            overscroll-behavior: contain;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            gap: 10px;
        }
        .list-item:active { background: #222; }

        .list-item-left { flex: 1; min-width: 0; }
        .list-item-name { font-size: 15px; }
        .list-item-sub {
            font-size: 12px;
            color: #666;
            margin-top: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .list-item-price {
            font-size: 14px;
            color: #f5a623;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .list-item-arrow { color: #444; font-size: 16px; flex-shrink: 0; }

        /* 詳細モーダル */
        .detail-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: flex-end;
            z-index: 100;
        }
        .detail-overlay.hidden { display: none; }

        .detail-panel {
            background: #1a1a1a;
            border-radius: 14px 14px 0 0;
            padding: 14px 18px 36px;
            width: 100%;
            max-height: 78dvh;
            overflow-y: auto;
        }

        .detail-handle {
            width: 36px; height: 4px;
            background: #3a3a3a;
            border-radius: 2px;
            margin: 0 auto 14px;
        }
        .detail-cat { font-size: 11px; color: #666; margin-bottom: 4px; }
        .detail-name { font-size: 19px; font-weight: bold; margin-bottom: 16px; line-height: 1.4; }

        .field { margin-bottom: 12px; }
        .field-label { font-size: 11px; color: #555; margin-bottom: 3px; }
        .field-value { font-size: 14px; line-height: 1.6; color: #ddd; }
        .field-value.price { font-size: 17px; color: #f5a623; font-weight: bold; }

        .detail-close {
            display: block; width: 100%;
            margin-top: 16px; padding: 13px;
            background: #272727; color: #ccc;
            border: none; border-radius: 8px;
            font-size: 15px; cursor: pointer;
        }
        .detail-close:active { background: #333; }

        /* ローディング */
        .center {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; gap: 14px;
            color: #555; font-size: 14px;
        }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid #2a2a2a;
            border-top-color: #c0392b;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .retry-btn {
            padding: 9px 22px;
            background: #c0392b; color: #fff;
            border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer;
        }
    </style>
</head>
<body>
<div id="app">

    <!-- トップバー -->
    <div class="topbar">
        <button class="back-btn" id="back-btn" onclick="goBack()">‹</button>
        <div class="topbar-title" id="topbar-title">カテゴリ</div>
        <div class="opacity-wrap">
            <span class="opacity-icon">◑</span>
            <input type="range" id="opacity-slider" min="20" max="100" value="92" oninput="setOpacity(this.value)">
        </div>
    </div>

    <!-- リスト本体 -->
    <div class="list" id="list">
        <div class="center"><div class="spinner"></div><span>読み込み中...</span></div>
    </div>

</div>

<!-- 詳細パネル -->
<div class="detail-overlay hidden" id="detail-overlay" onclick="onOverlayClick(event)">
    <div class="detail-panel">
        <div class="detail-handle"></div>
        <div class="detail-cat" id="d-cat"></div>
        <div class="detail-name" id="d-name"></div>
        <div id="d-body"></div>
        <button class="detail-close" onclick="closeDetail()">閉じる</button>
    </div>
</div>

<script>
    const SHEET_ID = '1yroIO2G1QG_F7J3plZYO_gdy3Y898wk6pUS3Y7lT7oU';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    let data = [];       // [{cat, name, price, amount, parts, desc, note}]
    let view = 'cats';   // 'cats' | 'items'
    let currentCat = null;

    /* ── 透明度 ── */
    function setOpacity(val) {
        const alpha = (val / 100).toFixed(2);
        document.getElementById('app').style.background = `rgba(15,15,15,${alpha})`;
    }

    /* ── データ取得 ── */
    async function load() {
        showLoading();
        try {
            const res = await fetch(CSV_URL + '&t=' + Date.now());
            const rows = parseCSV(await res.text());

            // ヘッダー除去 ＋ カテゴリをフィルダウン
            let lastCat = '';
            data = rows.slice(1)
                .map(r => {
                    if (r[0]) lastCat = r[0];
                    return {
                        cat:    lastCat,
                        name:   r[1] || '',
                        price:  r[2] || '',
                        amount: r[3] || '',
                        parts:  r[4] || '',
                        desc:   r[5] || '',
                        note:   r[6] || '',
                    };
                })
                .filter(r => r.name); // 商品名のない行を除外

            if (view === 'cats') renderCats();
            else if (view === 'items' && currentCat) renderItems(currentCat);
        } catch {
            document.getElementById('list').innerHTML =
                `<div class="center"><span>読み込み失敗</span><button class="retry-btn" onclick="load()">再試行</button></div>`;
        }
    }

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') load();
    });

    /* ── CSVパーサー ── */
    function parseCSV(text) {
        const rows = [];
        let row = [], cell = '', q = false;
        for (let i = 0; i < text.length; i++) {
            const c = text[i];
            if (q) {
                if (c === '"') { if (text[i+1] === '"') { cell += '"'; i++; } else q = false; }
                else cell += c;
            } else {
                if (c === '"') q = true;
                else if (c === ',') { row.push(cell.trim()); cell = ''; }
                else if (c === '\n' || c === '\r') {
                    if (c === '\r' && text[i+1] === '\n') i++;
                    row.push(cell.trim()); rows.push(row); row = []; cell = '';
                } else cell += c;
            }
        }
        if (row.length) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }

    /* ── カテゴリ一覧 ── */
    function renderCats() {
        view = 'cats';
        document.getElementById('back-btn').classList.remove('visible');
        document.getElementById('topbar-title').textContent = 'カテゴリ';

        const seen = new Set();
        const cats = data.map(r => r.cat).filter(c => c && !seen.has(c) && seen.add(c));

        document.getElementById('list').innerHTML = cats.map(cat => `
            <div class="list-item" onclick="selectCat('${esc(cat)}')">
                <div class="list-item-name">${esc(cat)}</div>
                <div class="list-item-arrow">›</div>
            </div>
        `).join('');
    }

    /* ── 商品一覧 ── */
    function selectCat(cat) {
        currentCat = cat;
        renderItems(cat);
    }

    function renderItems(cat) {
        view = 'items';
        document.getElementById('back-btn').classList.add('visible');
        document.getElementById('topbar-title').textContent = cat;

        const items = data.filter(r => r.cat === cat);
        const el = document.getElementById('list');

        el.innerHTML = items.map((item, i) => {
            const sub = [item.amount, item.parts].filter(Boolean).join(' · ');
            const globalIdx = data.indexOf(item);
            return `<div class="list-item" onclick="showDetail(${globalIdx})">
                <div class="list-item-left">
                    <div class="list-item-name">${esc(item.name)}</div>
                    ${sub ? `<div class="list-item-sub">${esc(sub)}</div>` : ''}
                </div>
                ${item.price ? `<div class="list-item-price">${esc(item.price)}</div>` : ''}
                <div class="list-item-arrow">›</div>
            </div>`;
        }).join('');
        el.scrollTop = 0;
    }

    /* ── 詳細 ── */
    function showDetail(idx) {
        const r = data[idx];
        document.getElementById('d-cat').textContent = r.cat;
        document.getElementById('d-name').textContent = r.name;

        const fields = [
            ['値段',        r.price,  'price'],
            ['枚数 / グラム', r.amount, ''],
            ['材料 / 部位',  r.parts,  ''],
            ['説明',         r.desc,   ''],
            ['注意点',       r.note,   ''],
        ];
        document.getElementById('d-body').innerHTML = fields
            .filter(([, v]) => v)
            .map(([label, val, cls]) => `
                <div class="field">
                    <div class="field-label">${esc(label)}</div>
                    <div class="field-value ${cls}">${esc(val)}</div>
                </div>`)
            .join('');

        document.getElementById('detail-overlay').classList.remove('hidden');
    }

    function closeDetail() {
        document.getElementById('detail-overlay').classList.add('hidden');
    }
    function onOverlayClick(e) {
        if (e.target === document.getElementById('detail-overlay')) closeDetail();
    }

    /* ── 戻る ── */
    function goBack() {
        closeDetail();
        renderCats();
    }

    function showLoading() {
        document.getElementById('list').innerHTML =
            '<div class="center"><div class="spinner"></div><span>読み込み中...</span></div>';
    }

    function esc(s) {
        return String(s ?? '')
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
</script>
</body>
</html>
