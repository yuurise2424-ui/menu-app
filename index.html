<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>メニュー案内</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        /* 全画面表示のベース設定 */
        html, body {
            height: 100%;
            background: #000; /* ブラウザのデフォルト背景として黒を設定 */
            font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            overflow: hidden; /* 全体のスクロールを禁止 */
        }

        /* アプリのメインコンテナ */
        #app {
            height: 100dvh; /* スマホブラウザのアドレスバーを考慮した高さ */
            display: flex;
            flex-direction: column;
            background: rgba(20, 20, 20, 0.85); /* 透明度スライダーの対象 */
            color: #eee;
            width: 100%;
        }

        /* ヘッダー部 */
        .header {
            padding: 12px 16px;
            border-bottom: 1px solid #333;
            background: rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            background: none; border: none; color: #aaa;
            font-size: 24px; cursor: pointer;
            padding: 0 8px; display: none; line-height: 1;
        }
        .back-btn.visible { display: block; }

        .header-title {
            flex: 1; font-size: 16px; font-weight: bold;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-align: center;
        }

        /* リスト部分 */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            overscroll-behavior: contain;
        }

        .list-item {
            border-bottom: 1px solid #333;
            padding: 16px 0;
            cursor: pointer;
        }
        .list-item:last-child { border-bottom: none; }

        /* 商品・カテゴリのヘッダー */
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-name { font-size: 16px; font-weight: bold; flex: 1; line-height: 1.4; }
        .item-price { font-size: 15px; color: #f5a623; margin-left: 12px; white-space: nowrap; }
        .arrow { color: #666; font-size: 18px; margin-left: 12px; }

        /* 商品の詳細（アコーディオン） */
        .item-details {
            display: none;
            margin-top: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            font-size: 14px;
        }
        .list-item.open .item-details { display: block; }
        
        .field { margin-bottom: 10px; }
        .field:last-child { margin-bottom: 0; }
        .field-label { font-size: 12px; color: #888; margin-bottom: 4px; }
        .field-value { color: #ddd; line-height: 1.5; }

        /* フッター部（透明度スライダー） */
        .footer {
            padding: 12px 16px;
            border-top: 1px solid #333;
            background: rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .opacity-wrap {
            display: flex; align-items: center; gap: 12px; width: 100%; max-width: 300px;
        }
        .opacity-icon { font-size: 18px; color: #aaa; }
        #opacity-slider {
            flex: 1; height: 4px; accent-color: #c0392b; cursor: pointer;
        }

        /* ローディング */
        .status-msg { padding: 30px 20px; text-align: center; font-size: 15px; color: #888; }
    </style>
</head>
<body>

<div id="app">
    <!-- ヘッダー -->
    <div class="header">
        <button class="back-btn" id="back-btn" onclick="renderCats()">‹</button>
        <div class="header-title" id="header-title">読み込み中...</div>
        <!-- レイアウト調整用のダミー要素（タイトルを中央に保つため） -->
        <div style="width: 40px; display: none;" id="header-spacer"></div>
    </div>

    <!-- リスト -->
    <div class="list-container" id="item-list">
        <div class="status-msg">データを取得しています...</div>
    </div>

    <!-- フッター（透明度調整） -->
    <div class="footer">
        <div class="opacity-wrap">
            <span class="opacity-icon">◑</span>
            <input type="range" id="opacity-slider" min="20" max="100" value="85" oninput="setOpacity(this.value)">
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '1yroIO2G1QG_F7J3plZYO_gdy3Y898wk6pUS3Y7lT7oU';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    let data = [];

    // 透明度設定
    function setOpacity(val) {
        const alpha = (val / 100).toFixed(2);
        document.getElementById('app').style.background = `rgba(20, 20, 20, ${alpha})`;
    }

    // 起動時にデータを取得
    async function load() {
        try {
            const res = await fetch(CSV_URL + '&t=' + Date.now());
            const text = await res.text();
            const rows = parseCSV(text);

            let lastCat = '';
            data = rows.slice(1)
                .map(r => {
                    if (r[0]) lastCat = r[0];
                    return {
                        cat:    lastCat,
                        name:   r[1] || '',
                        price:  r[2] || '',
                        amount: r[3] || '',
                        parts:  r[4] || '',
                        desc:   r[5] || '',
                        note:   r[6] || '',
                    };
                })
                .filter(r => r.name);

            renderCats();
        } catch (e) {
            document.getElementById('item-list').innerHTML = 
                `<div class="status-msg">読み込み失敗。<br><button onclick="load()" style="margin-top:15px; padding:8px 16px;">再試行</button></div>`;
            document.getElementById('header-title').textContent = 'エラー';
        }
    }

    // CSVパーサー
    function parseCSV(text) {
        const rows = [];
        let row = [], cell = '', q = false;
        for (let i = 0; i < text.length; i++) {
            const c = text[i];
            if (q) {
                if (c === '"') { if (text[i+1] === '"') { cell += '"'; i++; } else q = false; }
                else cell += c;
            } else {
                if (c === '"') q = true;
                else if (c === ',') { row.push(cell.trim()); cell = ''; }
                else if (c === '\n' || c === '\r') {
                    if (c === '\r' && text[i+1] === '\n') i++;
                    row.push(cell.trim()); rows.push(row); row = []; cell = '';
                } else cell += c;
            }
        }
        if (row.length) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }

    // カテゴリ一覧の描画
    function renderCats() {
        const backBtn = document.getElementById('back-btn');
        const spacer = document.getElementById('header-spacer');
        
        backBtn.classList.remove('visible');
        spacer.style.display = 'none';
        document.getElementById('header-title').textContent = 'カテゴリ';

        const seen = new Set();
        const cats = data.map(r => r.cat).filter(c => c && !seen.has(c) && seen.add(c));

        if (cats.length === 0) {
            document.getElementById('item-list').innerHTML = `<div class="status-msg">データがありません</div>`;
            return;
        }

        document.getElementById('item-list').innerHTML = cats.map(cat => `
            <div class="list-item" onclick="renderItems('${esc(cat)}')">
                <div class="item-header">
                    <div class="item-name">${esc(cat)}</div>
                    <div class="arrow">›</div>
                </div>
            </div>
        `).join('');
    }

    // アイテム一覧の描画
    function renderItems(cat) {
        const backBtn = document.getElementById('back-btn');
        const spacer = document.getElementById('header-spacer');
        
        backBtn.classList.add('visible');
        spacer.style.display = 'block';
        document.getElementById('header-title').textContent = cat;

        const items = data.filter(r => r.cat === cat);
        const listEl = document.getElementById('item-list');

        listEl.innerHTML = items.map((item) => {
            const details = [
                { label: '枚数/グラム', val: item.amount },
                { label: '材料/部位', val: item.parts },
                { label: '説明', val: item.desc },
                { label: '注意点', val: item.note }
            ].filter(d => d.val);

            let detailsHtml = '';
            if (details.length > 0) {
                detailsHtml = `<div class="item-details">` + 
                    details.map(d => `
                        <div class="field">
                            <div class="field-label">${esc(d.label)}</div>
                            <div class="field-value">${esc(d.val)}</div>
                        </div>
                    `).join('') + 
                `</div>`;
            }

            return `
                <div class="list-item" onclick="if(this.querySelector('.item-details')) this.classList.toggle('open')">
                    <div class="item-header">
                        <div class="item-name">${esc(item.name)}</div>
                        ${item.price ? `<div class="item-price">${esc(item.price)}</div>` : ''}
                    </div>
                    ${detailsHtml}
                </div>
            `;
        }).join('');
        
        listEl.scrollTop = 0;
    }

    function esc(s) {
        return String(s ?? '')
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
</script>
</body>
</html>
